<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trading Journal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="icon.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }
        .auth-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 5px;
            color: var(--text-primary);
        }
        .auth-header p {
            color: var(--text-secondary);
            margin: 0;
        }
        .auth-card .form-group {
            margin-bottom: 20px;
        }
        .auth-card .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--text-primary);
        }
        .auth-card .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all var(--transition-fast);
        }
        .auth-card .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            width: 100%;
            padding-right: 45px;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .password-toggle:hover {
            color: var(--text-primary);
            background: var(--bg-secondary);
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
        }
        .auth-error {
            background: rgba(247, 37, 133, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 10px 15px;
            border-radius: var(--radius-md);
            margin-top: 15px;
            display: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="icon icon-chart-line"></span>
                <h1>TradingJournal</h1>
                <p>Sign in to your account</p>
            </div>
            
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required 
                           autocomplete="off" value="" readonly onfocus="this.removeAttribute('readonly')">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required 
                               autocomplete="new-password" value="" readonly onfocus="this.removeAttribute('readonly')">
                        <button type="button" class="password-toggle" id="togglePassword">👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <span class="icon icon-check-circle"></span> Sign In
                </button>
            </form>
            
            <div id="errorMessage" class="auth-error"></div>
            
            <div class="auth-footer">
                Don't have an account? <a href="/register.html">Create one</a>
            </div>
        </div>
    </div>
    <script src="api.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                this.textContent = '👁️';
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="icon icon-spinner"></span> Signing in...';
            errorDiv.style.display = 'none';
            
            try {
                const response = await API.login({ email, password });
                if (response.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = response.message || 'Login failed. Please try again.';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span class="icon icon-check-circle"></span> Sign In';
            }
        });

        if (API.isAuthenticated()) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
